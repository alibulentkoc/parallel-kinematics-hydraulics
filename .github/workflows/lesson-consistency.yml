name: lesson-consistency

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  content-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Lesson Consistency Gate (content + nav + homepage)
        run: python3 governance/lesson_consistency_check.py

  site-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install MkDocs Material
        run: pip install mkdocs-material
      - name: Strict build (catches broken links, missing nav targets, render errors)
        run: mkdocs build --strict
