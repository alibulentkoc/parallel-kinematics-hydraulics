<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PKM Testbed — Grading Console</title>
<style>
  :root{
    --bg:#0e1217;--panel:#151b22;--panel-2:#1b232c;--rule:#2c3a47;
    --ink:#cdd6df;--ink-dim:#8a97a3;--ink-faint:#5b6975;
    --accent:#39c5e0;--ok:#3fe0a0;--warn:#ffb454;--fault:#ff5470;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.45;
    max-width:880px;margin:0 auto;padding:0 16px 48px}
  header{display:flex;align-items:baseline;gap:14px;padding:14px 0;border-bottom:1px solid var(--rule)}
  h1{font-size:13px;letter-spacing:.18em;margin:0;text-transform:uppercase;font-weight:600} h1 b{color:var(--accent)}
  .tag{color:var(--ink-faint);font-size:11px}
  .panel{background:var(--panel);border:1px solid var(--rule);border-radius:3px;padding:14px;margin-top:16px}
  .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  label.fld{display:flex;flex-direction:column;gap:4px;font-size:11px;color:var(--ink-faint)}
  input[type=file]{font-family:var(--mono);font-size:11px;color:var(--ink)}
  select{background:var(--panel-2);color:var(--ink);border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:12px;padding:4px}
  button{background:var(--panel-2);color:var(--ink);border:1px solid var(--rule);border-radius:2px;font-family:var(--mono);font-size:12px;padding:6px 14px;cursor:pointer}
  button.go{border-color:#1e3b30;color:var(--ok)} button:hover{border-color:var(--accent);color:var(--accent)}
  .score{display:flex;align-items:baseline;gap:14px;margin:4px 0 12px}
  .pct{font-size:38px;font-weight:700;font-variant-numeric:tabular-nums}
  .grade{font-size:22px;padding:2px 12px;border:1px solid var(--rule);border-radius:3px}
  .g-A{color:var(--ok);border-color:#1e3b30}.g-B{color:var(--accent)}.g-C{color:var(--warn);border-color:#4a3a1a}.g-D{color:var(--warn)}.g-F{color:var(--fault);border-color:#4a1e28}
  table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
  th,td{text-align:left;padding:5px 6px;border-bottom:1px solid var(--rule);vertical-align:top}
  th{color:var(--ink-faint);font-size:10px;text-transform:uppercase;letter-spacing:.06em}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .bar{height:6px;background:var(--panel-2);border-radius:3px;overflow:hidden;min-width:80px}
  .bar i{display:block;height:100%;background:var(--accent)}
  .skip{color:var(--ink-faint)} .detail{color:var(--ink-dim);font-size:11px}
  .meta{color:var(--ink-faint);font-size:11px;margin-top:6px}
  .faults{color:var(--warn);font-size:11px}
  .note{color:var(--ink-faint);font-size:11px}
</style>
</head>
<body>
<header><h1><b>PKM</b> Grading Console</h1><span class="tag">rubric-scored · sim &amp; hardware logs</span></header>

<div class="panel">
  <div class="row">
    <label class="fld">Student submission (.json / .csv)
      <input type="file" id="subFile" accept=".json,.csv"></label>
    <label class="fld">Answer key / reference (optional)
      <input type="file" id="refFile" accept=".json,.csv"></label>
    <label class="fld">Rubric
      <select id="rubricSel"><option value="">auto (from submission)</option></select></label>
    <button class="go" id="gradeBtn">Grade</button>
  </div>
  <p class="note" id="status">Load a submission produced by the Student Workbench (or any log in the canonical schema).</p>
</div>

<div class="panel" id="report" style="display:none"></div>

<script type="module">
import { gradeSubmission, getRubric, RUBRICS } from "./src/grading/index.js";

const $=(id)=>document.getElementById(id);
let subData=null, refData=null;

Object.keys(RUBRICS).forEach(id=>{const o=document.createElement("option");o.value=id;o.textContent=`${id} — ${RUBRICS[id].title}`;$("rubricSel").appendChild(o);});

function readFile(file){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsText(file);}); }
function parseMaybe(text){ const t=text.trim(); if(t[0]==="{"||t[0]==="[") { try{return JSON.parse(t);}catch{return t;} } return t; }

$("subFile").onchange=async(e)=>{ const f=e.target.files[0]; if(f){ subData=parseMaybe(await readFile(f)); $("status").textContent=`Submission loaded: ${f.name}`; } };
$("refFile").onchange=async(e)=>{ const f=e.target.files[0]; if(f){ refData=parseMaybe(await readFile(f)); $("status").textContent=`Reference loaded: ${f.name}`; } };

$("gradeBtn").onclick=()=>{
  if(!subData){ $("status").textContent="Load a submission first."; return; }
  try{
    const rubricId=$("rubricSel").value;
    const opts={};
    if(rubricId) opts.rubric=getRubric(rubricId);
    if(refData) opts.reference=refData;
    const rep=gradeSubmission(subData, opts);
    renderReport(rep);
    $("status").textContent="Graded.";
  }catch(err){ $("status").textContent="Error: "+err.message; $("report").style.display="none"; }
};

function renderReport(r){
  const el=$("report"); el.style.display="block";
  const items=r.items.map(it=>{
    if(it.skipped) return `<tr><td>${it.label}</td><td class="num skip">—</td><td class="skip" colspan="2">skipped · ${it.detail}</td></tr>`;
    const pct=Math.round(it.score*100);
    return `<tr>
      <td>${it.label}</td>
      <td class="num">${it.points.toFixed(1)} / ${it.weight}</td>
      <td><div class="bar"><i style="width:${pct}%;background:${it.score>=0.99?'var(--ok)':it.score>=0.5?'var(--accent)':'var(--warn)'}"></i></div></td>
      <td class="detail">${it.detail}</td></tr>`;
  }).join("");
  el.innerHTML=`
    <div class="score">
      <span class="pct">${r.percent.toFixed(1)}%</span>
      <span class="grade g-${r.grade}">${r.grade}</span>
      <span class="meta">${r.title} · ${r.dof}-DOF${r.studentId?` · ${r.studentId}`:""} · ${r.earned.toFixed(1)}/${r.applicableTotal} pts</span>
    </div>
    <table><thead><tr><th>Criterion</th><th class="num">Points</th><th>Score</th><th>Detail</th></tr></thead>
    <tbody>${items}</tbody></table>
    <p class="meta">metrics — finalErr ${fmt(r.metrics.finalErr)} · settle ${fmt(r.metrics.settleTime)} s · overshoot ${(r.metrics.overshoot*100).toFixed(0)}% · meanErr ${fmt(r.metrics.meanErr)} · min w ${fmt(r.metrics.minManip)} · ${r.metrics.samples} samples</p>
    ${r.faults.length?`<p class="faults">faults observed: ${r.faults.join(", ")}</p>`:""}`;
}
function fmt(v){ return Number.isFinite(v)?(Math.abs(v)<1e-2?v.toExponential(2):v.toFixed(3)):"—"; }
</script>
</body>
</html>
