<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PWM / Control Lab — PKM Testbed</title>
<style>
  :root{
    --bg:#0e1217;--panel:#151b22;--panel2:#1b232c;--rule:#2c3a47;--grid:#22303c;
    --ink:#cdd6df;--dim:#8a97a3;--faint:#5b6975;
    --accent:#39c5e0;--ok:#3fe0a0;--warn:#ffb454;--fault:#ff5470;--ghost:#43607a;
    --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--mono);font-size:13px;line-height:1.5;padding:18px;max-width:1040px;margin:0 auto}
  h1{font-size:14px;letter-spacing:.14em;text-transform:uppercase;margin:0 0 2px} h1 b{color:var(--accent)}
  .sub{color:var(--faint);font-size:12px;margin-bottom:12px}
  .bar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .seg{display:flex;border:1px solid var(--rule);border-radius:5px;overflow:hidden}
  .seg button{background:var(--panel);color:var(--dim);border:0;padding:5px 11px;font-family:inherit;font-size:11px;letter-spacing:.06em;cursor:pointer;text-transform:uppercase}
  .seg button[aria-pressed="true"]{background:var(--accent);color:#06222b}
  .wrap{display:grid;grid-template-columns:1fr 300px;gap:14px;align-items:start}
  .stage{background:var(--panel);border:1px solid var(--rule);border-radius:6px;overflow:hidden}
  svg{display:block;width:100%;height:auto}
  aside{display:flex;flex-direction:column;gap:10px}
  .card{background:var(--panel);border:1px solid var(--rule);border-radius:6px;padding:10px 12px}
  .card h2{font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin:0 0 8px}
  table{width:100%;border-collapse:collapse;font-size:12px} td{padding:2px 0;font-variant-numeric:tabular-nums}
  td:first-child{color:var(--dim)} td:last-child{text-align:right}
  .pill{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;border:1px solid var(--rule)}
  .ok{color:var(--ok);border-color:#1e3b30}.warn{color:var(--warn);border-color:#4a3a1a}.fault{color:var(--fault);border-color:#4a1e28}
  label.f{display:flex;justify-content:space-between;align-items:center;gap:8px;margin:5px 0;color:var(--dim);font-size:12px}
  input[type=range]{width:130px;accent-color:var(--accent)}
  .step{border-left:2px solid var(--rule);padding:2px 0 2px 10px;margin:8px 0}
  .step.active{border-color:var(--accent)}
  .step .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
  .step .v{font-size:12px;color:var(--ink)}
  .btn{background:var(--panel2);color:var(--accent);border:1px solid var(--rule);border-radius:5px;padding:6px 10px;font-family:inherit;font-size:11px;letter-spacing:.05em;cursor:pointer;text-transform:uppercase;width:100%;margin-top:6px}
  .btn:hover{border-color:var(--accent)}
  .verdict{font-size:12px;margin-top:6px;min-height:16px}
  .hint{color:var(--faint);font-size:11px;margin-top:8px}
  .leg{font-size:11px;color:var(--faint);margin-top:4px}
</style>
</head>
<body>
  <h1><b>PWM / Control</b> Lab</h1>
  <div class="sub">Family 3 demo — on/off DCV control by PWM · duty, position, coordination, tuning · the signature control experience</div>

  <div class="bar">
    <div class="seg" id="view">
      <button data-view="duty" aria-pressed="true">Duty sweep</button>
      <button data-view="pos" aria-pressed="false">Position</button>
      <button data-view="coord" aria-pressed="false">Coordinated</button>
      <button data-view="tune" aria-pressed="false">Tuning</button>
    </div>
    <div class="seg" id="model">
      <button data-model="bangbang" aria-pressed="true">On/off</button>
      <button data-model="pwm" aria-pressed="false">PWM</button>
      <button data-model="prop" aria-pressed="false">Proportional</button>
    </div>
    <div class="seg" id="role">
      <button data-role="student" aria-pressed="true">Student</button>
      <button data-role="instructor" aria-pressed="false">Instructor</button>
    </div>
  </div>

  <div class="wrap">
    <div class="stage"><svg id="svg" viewBox="0 0 600 360" preserveAspectRatio="xMidYMid meet"></svg></div>
    <aside>
      <div class="card"><h2>Inputs</h2><div id="inputs"></div></div>
      <div class="card"><h2>Metrics</h2><table id="state"></table>
        <div style="margin-top:8px"><span class="pill ok" id="status">nominal</span></div></div>
      <div class="card">
        <h2>Explore - Challenge - Artifact - Check</h2>
        <div class="step"><div class="k">Explore</div><div class="v">Change the valve model and inputs; watch the response.</div></div>
        <div class="step active"><div class="k">Challenge</div><div class="v" id="t-chal">-</div></div>
        <div class="step"><div class="k">Artifact</div><div class="v" id="t-art">-</div>
          <button class="btn" id="save">Save artifact</button></div>
        <div class="step"><div class="k">Check</div>
          <button class="btn" id="check">Check result</button>
          <div class="verdict" id="verdict"></div></div>
      </div>
      <div class="hint" id="hint"></div>
    </aside>
  </div>

<script>
"use strict";
var DT=0.001, N=3000, VMAX=0.3, T_TOTAL=DT*N, DRIFT=0.004, TAU=0.02;   // 1 ms step over 3 s: resolves the PWM carrier; DRIFT = load drift; TAU = actuator velocity lag
function clamp(v,a,b){ return Math.max(a,Math.min(b,v)); }
function sign(v){ return v<0?-1:(v>0?1:0); }

var st={ Kp:20, db:0.010, hyst:0.004, pwmFreq:40, target:0.10, dbDuty:0.08 };
var view="duty", model="bangbang", role="student";
var svg=document.getElementById("svg");

/* ---- closed-loop step simulation (single axis) ----------------------- */
function sim(mdl){
  var x=0,v=0,t=0,on=false,X=[],T=[],U=[];
  for(var k=0;k<N;k++){
    var e=st.target-x, ueff=0;
    if(mdl==="prop"){ var uc=clamp(st.Kp*e,-1,1); ueff=Math.abs(uc)<0.02?0:uc; }
    else if(mdl==="pwm"){ var uc2=clamp(st.Kp*e,-1,1); var phase=(t*st.pwmFreq)%1; ueff=(phase<Math.abs(uc2))?sign(uc2):0; }
    else { if(on){ if(Math.abs(e)<st.db) on=false; } else { if(Math.abs(e)>st.db+st.hyst) on=true; } ueff=on?sign(e):0; }
    v += (ueff*VMAX - v)*(DT/TAU);          // actuator velocity lag
    x += (v - DRIFT)*DT; t+=DT; X.push(x); T.push(t); U.push(Math.abs(ueff));
  }
  var tailStart=Math.floor(N*0.8), tail=X.slice(tailStart);
  var lc=Math.max.apply(null,tail)-Math.min.apply(null,tail);
  var tailMean=tail.reduce(function(a,b){return a+b;},0)/tail.length;
  var finalErr=Math.abs(st.target-tailMean);
  var tol=Math.max(0.002,st.target*0.02), settle=0;
  for(var i=0;i<N;i++){ if(Math.abs(st.target-X[i])>tol) settle=T[i]; }
  var duty=U.reduce(function(a,b){return a+b;},0)/N;
  return {X:X,T:T,finalErr:finalErr,limitCycle:lc,settle:settle,duty:duty};
}

/* ---- coordinated path tracking (circle) ------------------------------ */
function simPath(){
  var cx=0,cy=0.7,R=0.05,px=cx+R,py=cy,TX=[],TY=[],PX=[],PY=[],sse=0;
  for(var k=0;k<N;k++){
    var ang=2*Math.PI*k/N, tx=cx+R*Math.cos(ang), ty=cy+R*Math.sin(ang);
    px+=clamp(st.Kp*(tx-px),-1,1)*VMAX*DT; py+=clamp(st.Kp*(ty-py),-1,1)*VMAX*DT;
    TX.push(tx);TY.push(ty);PX.push(px);PY.push(py); sse+=(tx-px)*(tx-px)+(ty-py)*(ty-py);
  }
  return {TX:TX,TY:TY,PX:PX,PY:PY,rmse:Math.sqrt(sse/N)};
}

/* ---- challenges ------------------------------------------------------ */
var CHAL={
  duty:{ c:"Produce a monotonic duty->speed curve and identify the deadband.", a:"Duty-cycle characterization.",
         test:function(){ return st.dbDuty>0 && st.dbDuty<0.4; } },
  pos:{ c:"Park within 1.5x the deadband with a bounded limit cycle.", a:"Position-control demo.",
        test:function(){ var s=sim(model); return s.finalErr<=1.5*(model==="bangbang"?st.db:0.004) && s.limitCycle<=2*st.db+0.004; } },
  coord:{ c:"Track the path with RMSE <= 10 mm.", a:"Coordinated / task-space runs.",
          test:function(){ return simPath().rmse<=0.010; } },
  tune:{ c:"Settle within 2.5 s with limit cycle <= deadband bound.", a:"Tuned control report.",
         test:function(){ var s=sim(model); return s.settle<=2.5 && s.limitCycle<=2*st.db+0.004; } }
};

/* ---- inputs per view ------------------------------------------------- */
function slider(key,label,min,max,step,unit){ var val=st[key];
  return '<label class="f"><span>'+label+'</span><input type="range" data-k="'+key+'" data-unit="'+(unit||'')+'" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'"><b id="lbl-'+key+'">'+val+(unit||'')+'</b></label>'; }
function renderInputs(){
  var h="";
  if(view==="duty"){ h+=slider("dbDuty","duty deadband",0.0,0.4,0.01,""); }
  else if(view==="coord"){ h+=slider("Kp","gain Kp",2,60,1,""); }
  else { // pos / tune
    h+=slider("target","target",0.03,0.18,0.005," m");
    if(model==="bangbang"){ h+=slider("db","deadband",0.002,0.040,0.001," m")+slider("hyst","hysteresis",0.0,0.020,0.001," m"); }
    else if(model==="pwm"){ h+=slider("Kp","gain Kp",2,60,1,"")+slider("pwmFreq","PWM freq",5,80,1," Hz"); }
    else { h+=slider("Kp","gain Kp",2,60,1,""); }
  }
  document.getElementById("inputs").innerHTML=h;
  Array.prototype.forEach.call(document.querySelectorAll('#inputs input'),function(inp){ inp.addEventListener("input",function(){ st[inp.dataset.k]=+inp.value; var lbl=document.getElementById("lbl-"+inp.dataset.k); if(lbl) lbl.textContent=(+inp.value)+(inp.dataset.unit||''); render(); }); });
}

/* ---- svg helpers ----------------------------------------------------- */
function el(t,a){ var e=document.createElementNS("http://www.w3.org/2000/svg",t); for(var k in a)e.setAttribute(k,a[k]); return e; }
function clear(){ while(svg.firstChild)svg.removeChild(svg.firstChild); }
function txt(x,y,s,fill,size,anchor){ var e=el("text",{x:x,y:y,fill:fill||"var(--dim)","font-size":size||11,"font-family":"var(--mono)","text-anchor":anchor||"start"}); e.textContent=s; svg.appendChild(e); }

var PX0=64,PX1=566,PY0=36,PY1=300;
function axes(xlab,ylab){ svg.appendChild(el("line",{x1:PX0,y1:PY1,x2:PX1,y2:PY1,stroke:"var(--rule)"})); svg.appendChild(el("line",{x1:PX0,y1:PY0,x2:PX0,y2:PY1,stroke:"var(--rule)"})); txt(PX1,PY1+18,xlab,"var(--faint)",11,"end"); txt(PX0,PY0-8,ylab,"var(--faint)",11); }
function path(xs,ys,xmax,ymax,col,w){ function X(v){return PX0+v/xmax*(PX1-PX0);} function Y(v){return PY1-v/ymax*(PY1-PY0);} var d=""; for(var i=0;i<xs.length;i++){ d+=(i?"L":"M")+X(xs[i]).toFixed(1)+" "+Y(ys[i]).toFixed(1); } svg.appendChild(el("path",{d:d,fill:"none",stroke:col,"stroke-width":w||2})); }

function drawTime(s,ymax){
  axes("time (s)","position (m)");
  // target line
  var ty=PY1-st.target/ymax*(PY1-PY0);
  svg.appendChild(el("line",{x1:PX0,y1:ty,x2:PX1,y2:ty,stroke:"var(--warn)","stroke-dasharray":"4 4","stroke-width":1}));
  if(role==="instructor" && model!=="prop"){ var sp=sim("prop"); path(sp.T,sp.X,T_TOTAL,ymax,"var(--ghost)",1.5); }
  path(s.T,s.X,T_TOTAL,ymax,"var(--accent)",2);
}

function render(){
  clear();
  var rows=[], statusCls="ok", statusMsg="nominal";
  if(view==="duty"){
    axes("duty cycle","avg speed (m/s)");
    var xs=[],ys=[]; for(var d=0;d<=1.0001;d+=0.02){ xs.push(d); ys.push(Math.max(0,(d-st.dbDuty)/(1-st.dbDuty))*VMAX); }
    path(xs,ys,1,VMAX,"var(--accent)",2);
    var dbx=PX0+st.dbDuty*(PX1-PX0); svg.appendChild(el("line",{x1:dbx,y1:PY0,x2:dbx,y2:PY1,stroke:"var(--fault)","stroke-dasharray":"3 3"}));
    txt(dbx+4,PY0+12,"deadband","var(--fault)",10);
    rows=[["deadband",(st.dbDuty*100).toFixed(0)+" %"],["max speed",VMAX.toFixed(2)+" m/s"]];
  } else if(view==="coord"){
    axes("x (m)","y (m)"); var p=simPath();
    // map workspace to plot: x in -0.2..0.2, y 0.5..0.9
    function MX(v){return PX0+(v+0.1)/0.2*(PX1-PX0);} function MY(v){return PY1-(v-0.6)/0.2*(PY1-PY0);}
    function poly(XS,YS,col,w){ var d=""; for(var i=0;i<XS.length;i++){ d+=(i?"L":"M")+MX(XS[i]).toFixed(1)+" "+MY(YS[i]).toFixed(1);} svg.appendChild(el("path",{d:d,fill:"none",stroke:col,"stroke-width":w})); }
    poly(p.TX,p.TY,"var(--warn)",1.5); poly(p.PX,p.PY,"var(--accent)",2);
    rows=[["path RMSE",(p.rmse*1000).toFixed(1)+" mm"],["Kp",st.Kp.toFixed(0)]];
    if(p.rmse>0.010){ statusCls="warn"; statusMsg="tracking error above 10 mm"; }
  } else {
    var s=sim(model); var ymax=Math.max(st.target*1.3,0.14); drawTime(s,ymax);
    rows=[["final error",(s.finalErr*1000).toFixed(1)+" mm"],["limit cycle",(s.limitCycle*1000).toFixed(1)+" mm"],["settling",s.settle.toFixed(2)+" s"],["duty",(s.duty*100).toFixed(0)+" %"]];
    if(model==="bangbang" && st.db>0.025){ statusCls="fault"; statusMsg="DEADBAND too large - coarse positioning"; }
    else if(model==="pwm" && st.pwmFreq<12){ statusCls="warn"; statusMsg="PWM freq low - visible ripple"; }
    else if(s.settle>2.5){ statusCls="warn"; statusMsg="slow - does not settle in 2.5 s"; }
    else if(s.limitCycle>2*st.db+0.006 && model!=="prop"){ statusCls="warn"; statusMsg="LIMIT CYCLE - oscillating about target"; }
  }
  document.getElementById("state").innerHTML=rows.map(function(r){return "<tr><td>"+r[0]+"</td><td>"+r[1]+"</td></tr>";}).join("");
  var stEl=document.getElementById("status"); stEl.className="pill "+statusCls; stEl.textContent=statusMsg;
  document.getElementById("t-chal").textContent=CHAL[view].c;
  document.getElementById("t-art").textContent=CHAL[view].a;
  document.getElementById("verdict").textContent="";
  var io=(view==="pos"||view==="tune");
  document.getElementById("model").style.opacity=io?1:0.4;
  document.getElementById("hint").innerHTML = role==="instructor"
    ? ((io?"Grey trace = proportional valve for comparison. ":"")+"Instructor mode: enlarge the deadband, drop PWM frequency, or detune the gain to show each failure mode.")
    : "Student mode: complete the challenge. On/off valves never settle to zero error - they park within a deadband.";
}

function wireSeg(id,fn){ var g=document.getElementById(id); g.addEventListener("click",function(e){ var b=e.target.closest("button"); if(!b)return; Array.prototype.forEach.call(g.children,function(c){c.setAttribute("aria-pressed",c===b);}); fn(b.dataset); }); }
wireSeg("view",function(d){ view=d.view; renderInputs(); render(); });
wireSeg("model",function(d){ model=d.model; renderInputs(); render(); });
wireSeg("role",function(d){ role=d.role; render(); });

document.getElementById("save").addEventListener("click",function(){
  var art={ family:"pwm-control-lab", view:view, model:model, inputs:JSON.parse(JSON.stringify(st)), challenge:CHAL[view].c, generated:new Date().toISOString() };
  if(view==="coord") art.result={path_rmse_mm:simPath().rmse*1000};
  else if(view!=="duty"){ var s=sim(model); art.result={final_err_mm:s.finalErr*1000,limit_cycle_mm:s.limitCycle*1000,settling_s:s.settle,duty_pct:s.duty*100}; }
  var blob=new Blob([JSON.stringify(art,null,2)],{type:"application/json"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="control-"+view+"-"+model+".json"; a.click();
  document.getElementById("verdict").innerHTML='<span class="ok">artifact saved.</span>';
});
document.getElementById("check").addEventListener("click",function(){
  var pass=CHAL[view].test();
  document.getElementById("verdict").innerHTML = pass ? '<span class="ok">PASS - meets the acceptance test.</span>' : '<span class="warn">Needs work - target not yet met.</span>';
});

renderInputs(); render();
</script>
</body>
</html>
