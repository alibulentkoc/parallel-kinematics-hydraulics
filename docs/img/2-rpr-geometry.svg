<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 380" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="640" height="380" fill="#0e1217"/>
  <!-- dexterity wash (bright top, dark bottom = manipulability ∝ y) -->
  <defs>
    <linearGradient id="dex" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c6a86" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#15324a" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0c1015" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <rect x="60" y="40" width="520" height="270" fill="url(#dex)"/>

  <!-- base line -->
  <line x1="60" y1="310" x2="580" y2="310" stroke="#3a4b59" stroke-width="1.5" stroke-dasharray="3 4"/>
  <text x="576" y="326" fill="#6b7884" font-size="11" text-anchor="end">base line — singular (y = 0)</text>

  <!-- anchors -->
  <polygon points="170,310 162,324 178,324" fill="#8a97a3"/>
  <polygon points="470,310 462,324 478,324" fill="#8a97a3"/>
  <text x="170" y="342" fill="#8a97a3" font-size="12" text-anchor="middle">B₁ = (−b, 0)</text>
  <text x="470" y="342" fill="#8a97a3" font-size="12" text-anchor="middle">B₂ = (+b, 0)</text>

  <!-- b dimension -->
  <line x1="170" y1="300" x2="320" y2="300" stroke="#5b6975" stroke-width="1"/>
  <text x="245" y="294" fill="#8a97a3" font-size="11" text-anchor="middle">b</text>

  <!-- legs -->
  <line x1="170" y1="310" x2="320" y2="120" stroke="#39c5e0" stroke-width="4" stroke-linecap="round"/>
  <line x1="470" y1="310" x2="320" y2="120" stroke="#39c5e0" stroke-width="4" stroke-linecap="round"/>
  <text x="225" y="205" fill="#cdd6df" font-size="13" text-anchor="end">L₁</text>
  <text x="415" y="205" fill="#cdd6df" font-size="13" text-anchor="start">L₂</text>

  <!-- unit leg vectors -->
  <line x1="320" y1="120" x2="295" y2="152" stroke="#3fe0a0" stroke-width="2"/>
  <line x1="320" y1="120" x2="345" y2="152" stroke="#3fe0a0" stroke-width="2"/>
  <text x="283" y="150" fill="#3fe0a0" font-size="11" text-anchor="end">û₁</text>
  <text x="357" y="150" fill="#3fe0a0" font-size="11" text-anchor="start">û₂</text>

  <!-- platform -->
  <circle cx="320" cy="120" r="9" fill="#3fe0a0" stroke="#0e1217" stroke-width="2"/>
  <line x1="306" y1="120" x2="334" y2="120" stroke="#3fe0a0" stroke-width="1"/>
  <line x1="320" y1="106" x2="320" y2="134" stroke="#3fe0a0" stroke-width="1"/>
  <text x="320" y="100" fill="#3fe0a0" font-size="13" text-anchor="middle">P = (x, y)</text>

  <!-- title -->
  <text x="60" y="28" fill="#39c5e0" font-size="13" letter-spacing="2">2-RPR PARALLEL GEOMETRY</text>
</svg>
