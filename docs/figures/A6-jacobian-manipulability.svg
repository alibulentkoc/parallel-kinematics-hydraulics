<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">JACOBIAN &amp; MANIPULABILITY</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">the Jacobian maps a unit joint-rate circle to a task-velocity ellipse — its shape is dexterity</text>

  <!-- well-conditioned -->
  <g>
    <text x="150" y="100" fill="#3fe0a0" font-size="11" text-anchor="middle">well-conditioned   det J large</text>
    <circle cx="150" cy="180" r="55" fill="none" stroke="#2c3a47" stroke-width="1" stroke-dasharray="3 3"/>
    <ellipse cx="150" cy="180" rx="55" ry="42" fill="rgba(63,224,160,0.14)" stroke="#3fe0a0" stroke-width="1.8"/>
    <line x1="150" y1="180" x2="205" y2="180" stroke="#3fe0a0" stroke-width="1.4"/>
    <line x1="150" y1="180" x2="150" y2="138" stroke="#3fe0a0" stroke-width="1.4"/>
    <text x="150" y="262" fill="#8a97a3" font-size="10" text-anchor="middle">near-round ellipse</text>
  </g>
  <!-- near-singular -->
  <g>
    <text x="390" y="100" fill="#ff5470" font-size="11" text-anchor="middle">near-singular   det J → 0</text>
    <circle cx="390" cy="180" r="55" fill="none" stroke="#2c3a47" stroke-width="1" stroke-dasharray="3 3"/>
    <ellipse cx="390" cy="180" rx="66" ry="9" fill="rgba(255,84,112,0.16)" stroke="#ff5470" stroke-width="1.8"/>
    <line x1="390" y1="180" x2="456" y2="180" stroke="#ff5470" stroke-width="1.4"/>
    <line x1="390" y1="180" x2="390" y2="171" stroke="#ff5470" stroke-width="1.4"/>
    <text x="390" y="262" fill="#8a97a3" font-size="10" text-anchor="middle">collapsed to a line — lost a DOF</text>
  </g>

  <text x="270" y="300" fill="#8a97a3" font-size="11" text-anchor="middle">dashed = unit joint-rate circle   ·   solid = task-velocity ellipse = J · (joint rates)</text>

  <!-- formula strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">v = J · q̇       manipulability  w = √det(J Jᵀ)       w → 0 at a singularity (the ellipse flattens)</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">Stay where w is large; the safe-region map (Fig B3) bounds |det J| above a floor.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A6 · JACOBIAN / MANIPULABILITY · USED IN 3.3 · green=high dexterity red=singular</text>
</svg>
