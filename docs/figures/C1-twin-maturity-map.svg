<svg viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="600" height="280" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="20" y="30" fill="#39c5e0" font-size="13" letter-spacing="2.5">TWIN MATURITY MAP</text>
  <text x="20" y="48" fill="#5b6975" font-size="11">the digital twin matures stage by stage — each stage adds exactly one capability</text>

  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8a97a3"/></marker></defs>

  <!-- 5 stage boxes -->
  <g>
    <rect x="16" y="92" width="100" height="96" rx="5" fill="#151b22" stroke="#39c5e0" stroke-width="1.4"/>
    <text x="66" y="112" fill="#5b6975" font-size="10" text-anchor="middle">M0</text>
    <text x="66" y="130" fill="#cdd6df" font-size="12" text-anchor="middle">Observe</text>
    <text x="66" y="156" fill="#8a97a3" font-size="9" text-anchor="middle">run &amp; read</text>
    <text x="66" y="168" fill="#8a97a3" font-size="9" text-anchor="middle">the twin</text>
  </g>
  <g>
    <rect x="134" y="92" width="100" height="96" rx="5" fill="#151b22" stroke="#39c5e0" stroke-width="1.4"/>
    <text x="184" y="112" fill="#5b6975" font-size="10" text-anchor="middle">M1</text>
    <text x="184" y="130" fill="#cdd6df" font-size="12" text-anchor="middle">Kinematic</text>
    <text x="184" y="156" fill="#8a97a3" font-size="9" text-anchor="middle">geometry, IK/FK,</text>
    <text x="184" y="168" fill="#8a97a3" font-size="9" text-anchor="middle">workspace</text>
  </g>
  <g>
    <rect x="252" y="92" width="100" height="96" rx="5" fill="#151b22" stroke="#39c5e0" stroke-width="1.4"/>
    <text x="302" y="112" fill="#5b6975" font-size="10" text-anchor="middle">M2</text>
    <text x="302" y="130" fill="#cdd6df" font-size="12" text-anchor="middle">Hydraulic</text>
    <text x="302" y="156" fill="#8a97a3" font-size="9" text-anchor="middle">size cylinder,</text>
    <text x="302" y="168" fill="#8a97a3" font-size="9" text-anchor="middle">valve, pump</text>
  </g>
  <g>
    <rect x="370" y="92" width="100" height="96" rx="5" fill="#151b22" stroke="#39c5e0" stroke-width="1.4"/>
    <text x="420" y="112" fill="#5b6975" font-size="10" text-anchor="middle">M3</text>
    <text x="420" y="130" fill="#cdd6df" font-size="12" text-anchor="middle">Control</text>
    <text x="420" y="156" fill="#8a97a3" font-size="9" text-anchor="middle">PWM, coordinated,</text>
    <text x="420" y="168" fill="#8a97a3" font-size="9" text-anchor="middle">tuning</text>
  </g>
  <g>
    <rect x="488" y="92" width="100" height="96" rx="5" fill="#151b22" stroke="#3fe0a0" stroke-width="1.6"/>
    <text x="538" y="112" fill="#5b6975" font-size="10" text-anchor="middle">M4</text>
    <text x="538" y="130" fill="#3fe0a0" font-size="12" text-anchor="middle">Validation</text>
    <text x="538" y="156" fill="#8a97a3" font-size="9" text-anchor="middle">sync, accuracy,</text>
    <text x="538" y="168" fill="#8a97a3" font-size="9" text-anchor="middle">diagnose</text>
  </g>

  <!-- arrows -->
  <line x1="116" y1="140" x2="134" y2="140" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="234" y1="140" x2="252" y2="140" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="352" y1="140" x2="370" y2="140" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="470" y1="140" x2="488" y2="140" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>

  <text x="20" y="224" fill="#8a97a3" font-size="11">A later stage reuses every earlier twin; the course is built so the model never moves backward.</text>

  <text x="20" y="262" fill="#3a4753" font-size="9" letter-spacing="1">FIG C1 · TWIN MATURITY MAP · USED IN handbook, M0 intro · process diagram</text>
</svg>
