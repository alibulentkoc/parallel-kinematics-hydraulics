<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">TWIN SYNCHRONIZATION  WORKFLOW</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">log-level synchronization and replay — not real-time hardware-in-the-loop</text>

  <!-- rig log -->
  <rect x="40" y="100" width="150" height="60" fill="#1b232c" stroke="#ffb454" stroke-width="1.6"/>
  <text x="115" y="126" fill="#ffb454" font-size="12" text-anchor="middle">rig log</text>
  <text x="115" y="146" fill="#5b6975" font-size="10" text-anchor="middle">measured, shared schema</text>
  <!-- twin log -->
  <rect x="40" y="210" width="150" height="60" fill="#1b232c" stroke="#39c5e0" stroke-width="1.6"/>
  <text x="115" y="236" fill="#39c5e0" font-size="12" text-anchor="middle">twin log</text>
  <text x="115" y="256" fill="#5b6975" font-size="10" text-anchor="middle">simulated, same schema</text>

  <!-- align -->
  <rect x="250" y="155" width="120" height="60" fill="#1b232c" stroke="#cdd6df" stroke-width="1.6"/>
  <text x="310" y="181" fill="#cdd6df" font-size="12" text-anchor="middle">time-align</text>
  <text x="310" y="200" fill="#5b6975" font-size="10" text-anchor="middle">cross-correlate</text>

  <!-- synchronized pair -->
  <rect x="420" y="155" width="100" height="60" fill="#1b232c" stroke="#3fe0a0" stroke-width="1.6"/>
  <text x="470" y="181" fill="#3fe0a0" font-size="12" text-anchor="middle">aligned</text>
  <text x="470" y="200" fill="#5b6975" font-size="10" text-anchor="middle">pair → compare</text>

  <!-- arrows -->
  <line x1="190" y1="130" x2="250" y2="172" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="190" y1="240" x2="250" y2="198" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <line x1="370" y1="185" x2="420" y2="185" stroke="#8a97a3" stroke-width="1.5" marker-end="url(#a)"/>
  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8a97a3"/></marker></defs>

  <text x="22" y="300" fill="#8a97a3" font-size="11">A shared telemetry schema makes a rig log and a twin log directly row-comparable.</text>

  <!-- formula / note strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">A non-zero best-shift means the logs were misaligned in time — align BEFORE judging accuracy.</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">Real-time HIL is an advanced extension; this course validates by synchronized replay.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A9 · TWIN SYNC WORKFLOW · USED IN 4.1 · amber=rig cyan=twin green=aligned</text>
</svg>
