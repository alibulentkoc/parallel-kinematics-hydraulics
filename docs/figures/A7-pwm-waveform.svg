<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">PWM  WAVEFORM</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">pulse-width modulation turns an on/off valve into adjustable average flow</text>

  <!-- axes -->
  <line x1="60" y1="240" x2="500" y2="240" stroke="#2c3a47" stroke-width="1"/>
  <line x1="60" y1="90" x2="60" y2="240" stroke="#2c3a47" stroke-width="1"/>
  <text x="40" y="100" fill="#5b6975" font-size="10">on</text>
  <text x="38" y="244" fill="#5b6975" font-size="10">off</text>
  <text x="490" y="258" fill="#5b6975" font-size="10">t</text>

  <!-- square wave: duty ~0.4, three periods -->
  <polyline points="60,240 60,110 116,110 116,240 200,240 200,110 256,110 256,240 340,240 340,110 396,110 396,240 480,240"
    fill="none" stroke="#39c5e0" stroke-width="2"/>

  <!-- period + on-time markers (first period) -->
  <line x1="60" y1="262" x2="200" y2="262" stroke="#8a97a3" stroke-width="1"/>
  <line x1="60" y1="258" x2="60" y2="266" stroke="#8a97a3"/>
  <line x1="200" y1="258" x2="200" y2="266" stroke="#8a97a3"/>
  <text x="118" y="278" fill="#8a97a3" font-size="10" text-anchor="middle">period T = 1/f</text>
  <line x1="60" y1="100" x2="116" y2="100" stroke="#3fe0a0" stroke-width="1.4"/>
  <text x="88" y="92" fill="#3fe0a0" font-size="10" text-anchor="middle">on-time</text>

  <!-- average flow line -->
  <line x1="60" y1="188" x2="480" y2="188" stroke="#ffb454" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="486" y="192" fill="#ffb454" font-size="10">avg</text>
  <text x="300" y="182" fill="#ffb454" font-size="10">average flow ∝ duty</text>

  <!-- formula strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">duty = on-time ⁄ T      Q_avg ≈ duty · Q_max      higher carrier f → smaller ripple</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">Below a minimum duty the valve never opens — that floor is the deadband (see Fig A8).</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A7 · PWM WAVEFORM · USED IN 2.5 · cyan=valve command amber=resulting average</text>
</svg>
