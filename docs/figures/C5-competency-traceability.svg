<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="600" height="300" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="20" y="30" fill="#39c5e0" font-size="13" letter-spacing="2.5">COMPETENCY TRACEABILITY</text>
  <text x="20" y="48" fill="#5b6975" font-size="11">every competency resolves through the same chain — the course's anti-drift backbone</text>

  <defs><marker id="a" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8a97a3"/></marker></defs>

  <!-- pipeline labels -->
  <g font-size="9" text-anchor="middle" fill="#5b6975">
    <text x="58" y="84">Competency</text><text x="158" y="84">Lesson</text><text x="258" y="84">Demo / View</text>
    <text x="358" y="84">Artifact</text><text x="452" y="84">Assessment</text><text x="546" y="84">Threshold</text>
  </g>
  <!-- pipeline boxes (generic) -->
  <g>
    <rect x="20" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#39c5e0"/>
    <rect x="120" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#39c5e0"/>
    <rect x="220" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#39c5e0"/>
    <rect x="320" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#39c5e0"/>
    <rect x="414" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#39c5e0"/>
    <rect x="508" y="92" width="76" height="34" rx="4" fill="#151b22" stroke="#3fe0a0"/>
  </g>
  <g stroke="#8a97a3" stroke-width="1.4">
    <line x1="96" y1="109" x2="120" y2="109" marker-end="url(#a)"/>
    <line x1="196" y1="109" x2="220" y2="109" marker-end="url(#a)"/>
    <line x1="296" y1="109" x2="320" y2="109" marker-end="url(#a)"/>
    <line x1="396" y1="109" x2="414" y2="109" marker-end="url(#a)"/>
    <line x1="490" y1="109" x2="508" y2="109" marker-end="url(#a)"/>
  </g>

  <!-- worked example row -->
  <text x="20" y="168" fill="#8a97a3" font-size="10">worked example:</text>
  <g font-size="9" text-anchor="middle" fill="#cdd6df">
    <text x="58" y="196">C6</text>
    <text x="158" y="196">2.5</text>
    <text x="258" y="196">F3 · Duty</text>
    <text x="358" y="196">Duty-cycle</text>
    <text x="452" y="196">Duty lab</text>
    <text x="546" y="196">monotonic</text>
  </g>
  <g font-size="9" text-anchor="middle" fill="#cdd6df">
    <text x="58" y="224">C15</text>
    <text x="158" y="224">4.3</text>
    <text x="258" y="224">F4 · Accuracy</text>
    <text x="358" y="224">Accuracy rpt</text>
    <text x="452" y="224">Validation</text>
    <text x="546" y="224">≤10mm,≤15%</text>
  </g>

  <text x="20" y="262" fill="#8a97a3" font-size="11">Move a lesson and its row must still resolve end to end, or the change is rejected at review.</text>

  <text x="20" y="288" fill="#3a4753" font-size="9" letter-spacing="1">FIG C5 · COMPETENCY TRACEABILITY · USED IN handbook, instructor · process diagram</text>
</svg>
