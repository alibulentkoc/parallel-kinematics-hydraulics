<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">SOLENOID DCV  STATES</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">4/3 directional control valve — three discrete spool positions (on/off, not proportional)</text>

  <!-- EXTEND -->
  <g>
    <rect x="40" y="100" width="130" height="100" fill="#1b232c" stroke="#3fe0a0" stroke-width="1.6"/>
    <text x="105" y="92" fill="#3fe0a0" font-size="11" text-anchor="middle">EXTEND</text>
    <path d="M 70 180 L 70 120 L 100 120" stroke="#39c5e0" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <path d="M 140 180 L 140 120 L 110 120" stroke="#8a97a3" stroke-width="2" fill="none" marker-end="url(#ar2)"/>
    <text x="58" y="196" fill="#5b6975" font-size="10">P</text>
    <text x="132" y="196" fill="#5b6975" font-size="10">T</text>
  </g>
  <!-- HOLD -->
  <g>
    <rect x="205" y="100" width="130" height="100" fill="#1b232c" stroke="#8a97a3" stroke-width="1.6"/>
    <text x="270" y="92" fill="#cdd6df" font-size="11" text-anchor="middle">HOLD (centre)</text>
    <line x1="235" y1="180" x2="235" y2="150" stroke="#5b6975" stroke-width="2"/>
    <line x1="270" y1="180" x2="270" y2="150" stroke="#5b6975" stroke-width="2"/>
    <line x1="305" y1="180" x2="305" y2="150" stroke="#5b6975" stroke-width="2"/>
    <text x="250" y="138" fill="#5b6975" font-size="10">all ports blocked</text>
  </g>
  <!-- RETRACT -->
  <g>
    <rect x="370" y="100" width="130" height="100" fill="#1b232c" stroke="#ffb454" stroke-width="1.6"/>
    <text x="435" y="92" fill="#ffb454" font-size="11" text-anchor="middle">RETRACT</text>
    <path d="M 400 180 L 400 120 L 430 120" stroke="#39c5e0" stroke-width="2" fill="none" marker-end="url(#ar)"/>
    <path d="M 470 180 L 470 120 L 440 120" stroke="#8a97a3" stroke-width="2" fill="none" marker-end="url(#ar2)"/>
    <text x="388" y="196" fill="#5b6975" font-size="10">P</text>
    <text x="462" y="196" fill="#5b6975" font-size="10">T</text>
  </g>

  <!-- solenoids -->
  <rect x="20" y="130" width="14" height="40" fill="#1b232c" stroke="#39c5e0"/>
  <text x="6" y="186" fill="#39c5e0" font-size="10">sol a</text>
  <rect x="506" y="130" width="14" height="40" fill="#1b232c" stroke="#ffb454"/>
  <text x="498" y="186" fill="#ffb454" font-size="10">sol b</text>

  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#39c5e0"/></marker>
    <marker id="ar2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8a97a3"/></marker>
  </defs>

  <text x="22" y="250" fill="#8a97a3" font-size="11">P = supply   T = tank   A = cap port   B = rod port</text>

  <!-- formula / note strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">On/off valve: the spool snaps between states. Average flow is set by the FRACTION OF TIME</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">in EXTEND vs RETRACT — i.e. by PWM duty cycle (see Fig A7), not by a continuous opening.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A4 · DCV STATES · USED IN 2.2 · green=extend amber=retract grey=hold</text>
</svg>
