<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="600" height="300" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="20" y="30" fill="#39c5e0" font-size="13" letter-spacing="2.5">STUDENT ROADMAP</text>
  <text x="20" y="48" fill="#5b6975" font-size="11">15-week artifact spine — midterm at week 8, final at week 15</text>

  <!-- week scale -->
  <line x1="40" y1="120" x2="560" y2="120" stroke="#2c3a47" stroke-width="1"/>
  <!-- module bands -->
  <rect x="40" y="106" width="104" height="28" fill="rgba(57,197,224,0.14)" stroke="#39c5e0" stroke-width="1"/>
  <rect x="144" y="106" width="173" height="28" fill="rgba(57,197,224,0.10)" stroke="#39c5e0" stroke-width="1"/>
  <rect x="317" y="106" width="139" height="28" fill="rgba(57,197,224,0.10)" stroke="#39c5e0" stroke-width="1"/>
  <rect x="456" y="106" width="104" height="28" fill="rgba(63,224,160,0.12)" stroke="#3fe0a0" stroke-width="1"/>
  <text x="92" y="124" fill="#cdd6df" font-size="10" text-anchor="middle">M1 Kinematic</text>
  <text x="230" y="124" fill="#cdd6df" font-size="10" text-anchor="middle">M2 Hydraulic + build</text>
  <text x="386" y="124" fill="#cdd6df" font-size="10" text-anchor="middle">M3 Control</text>
  <text x="508" y="124" fill="#3fe0a0" font-size="10" text-anchor="middle">M4 Validation</text>

  <!-- week ticks -->
  <g fill="#5b6975" font-size="9" text-anchor="middle">
    <text x="40" y="150">W1</text><text x="144" y="150">W4</text><text x="230" y="150">W6</text>
    <text x="317" y="150">W9</text><text x="456" y="150">W13</text><text x="560" y="150">W15</text>
  </g>

  <!-- milestones -->
  <line x1="317" y1="92" x2="317" y2="170" stroke="#ffb454" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="317" y="86" fill="#ffb454" font-size="10" text-anchor="middle">MIDTERM W8 — 2-DOF build</text>
  <line x1="560" y1="92" x2="560" y2="170" stroke="#3fe0a0" stroke-width="1.4" stroke-dasharray="3 3"/>
  <text x="560" y="86" fill="#3fe0a0" font-size="10" text-anchor="end">FINAL W15 — 3-DOF validated</text>

  <!-- sprint band -->
  <rect x="180" y="158" width="137" height="16" fill="rgba(255,180,84,0.18)" stroke="#ffb454" stroke-width="0.8"/>
  <text x="248" y="170" fill="#ffb454" font-size="9" text-anchor="middle">Build Sprint W5–8</text>

  <text x="20" y="210" fill="#8a97a3" font-size="11">Each week produces a graded artifact; the two milestones are the integrated 2-DOF and 3-DOF systems.</text>
  <text x="20" y="230" fill="#8a97a3" font-size="11">The spine is artifact-driven — no lesson exists without producing or consuming a course artifact.</text>

  <text x="20" y="280" fill="#3a4753" font-size="9" letter-spacing="1">FIG C2 · STUDENT ROADMAP · USED IN handbook, instructor · process diagram</text>
</svg>
