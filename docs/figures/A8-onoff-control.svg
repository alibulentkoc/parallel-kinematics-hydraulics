<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">ON/OFF CONTROL  CONCEPT</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">why an on/off valve parks in a band and never settles to zero error</text>

  <!-- axes -->
  <line x1="60" y1="270" x2="500" y2="270" stroke="#2c3a47" stroke-width="1"/>
  <line x1="60" y1="90" x2="60" y2="270" stroke="#2c3a47" stroke-width="1"/>
  <text x="490" y="288" fill="#5b6975" font-size="10">t</text>
  <text x="30" y="96" fill="#5b6975" font-size="10">pos</text>

  <!-- target + deadband band -->
  <line x1="60" y1="150" x2="500" y2="150" stroke="#3fe0a0" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="486" y="146" fill="#3fe0a0" font-size="10">target</text>
  <rect x="60" y="135" width="440" height="30" fill="rgba(255,180,84,0.10)"/>
  <line x1="60" y1="135" x2="500" y2="135" stroke="#ffb454" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="60" y1="165" x2="500" y2="165" stroke="#ffb454" stroke-width="1" stroke-dasharray="2 3"/>
  <text x="486" y="130" fill="#ffb454" font-size="10">+db</text>
  <text x="486" y="178" fill="#ffb454" font-size="10">−db</text>

  <!-- response: rise then limit-cycle inside the band -->
  <polyline points="60,265 130,200 190,160 215,150 230,158 248,150 266,160 284,150 302,160 320,150 338,160 356,150 374,160 392,150 410,160 428,150 446,160 464,150 482,158"
    fill="none" stroke="#39c5e0" stroke-width="2"/>

  <!-- limit cycle annotation -->
  <line x1="250" y1="150" x2="250" y2="200" stroke="#5b6975" stroke-width="1" stroke-dasharray="2 2"/>
  <text x="258" y="216" fill="#8a97a3" font-size="10">limit cycle inside the deadband</text>
  <text x="120" y="240" fill="#8a97a3" font-size="10">full-speed approach</text>

  <!-- formula strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">valve ON when |error| &gt; db + hysteresis ;  OFF when |error| &lt; db   →   residual ≈ deadband</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">A proportional valve closes this band; an on/off valve trades accuracy for low cost.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A8 · ON/OFF CONTROL · USED IN 2.6, 3.6 · green=target amber=deadband cyan=response</text>
</svg>
