<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">HYDRAULIC POWER UNIT  ARCHITECTURE</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">reservoir → pump → relief / filter → supply — the source feeding every DCV and cylinder</text>

  <!-- reservoir -->
  <rect x="40" y="250" width="110" height="70" fill="none" stroke="#8a97a3" stroke-width="1.5"/>
  <text x="62" y="340" fill="#cdd6df" font-size="11">reservoir</text>
  <!-- motor + pump -->
  <circle cx="200" cy="220" r="22" fill="#1b232c" stroke="#cdd6df" stroke-width="1.5"/>
  <text x="200" y="225" fill="#cdd6df" font-size="12" text-anchor="middle">M</text>
  <circle cx="200" cy="160" r="22" fill="#1b232c" stroke="#39c5e0" stroke-width="1.6"/>
  <path d="M 200 145 L 213 167 L 187 167 Z" fill="#39c5e0"/>
  <text x="200" y="120" fill="#39c5e0" font-size="11" text-anchor="middle">pump</text>
  <line x1="150" y1="285" x2="200" y2="242" stroke="#5b6975" stroke-width="1.5"/>

  <!-- relief valve -->
  <rect x="280" y="138" width="44" height="44" fill="#1b232c" stroke="#ff5470" stroke-width="1.6"/>
  <path d="M 302 178 L 302 142" stroke="#ff5470" stroke-width="1.5" marker-end="url(#a)"/>
  <text x="270" y="128" fill="#ff5470" font-size="11">relief 21 MPa</text>
  <line x1="302" y1="182" x2="302" y2="300" stroke="#5b6975" stroke-width="1.2" stroke-dasharray="3 3"/>
  <line x1="302" y1="300" x2="150" y2="300" stroke="#5b6975" stroke-width="1.2" stroke-dasharray="3 3"/>

  <!-- filter -->
  <rect x="372" y="140" width="40" height="40" fill="#1b232c" stroke="#8a97a3" stroke-width="1.5" transform="rotate(45 392 160)"/>
  <text x="372" y="128" fill="#8a97a3" font-size="11">filter</text>

  <!-- supply line -->
  <line x1="222" y1="160" x2="280" y2="160" stroke="#39c5e0" stroke-width="2"/>
  <line x1="324" y1="160" x2="372" y2="160" stroke="#39c5e0" stroke-width="2"/>
  <line x1="412" y1="160" x2="500" y2="160" stroke="#39c5e0" stroke-width="2"/>
  <path d="M 490 160 L 490 160" />
  <text x="430" y="150" fill="#39c5e0" font-size="11">supply 16 MPa</text>
  <text x="430" y="178" fill="#5b6975" font-size="10">→ to DCV / cylinder</text>

  <!-- gauge -->
  <circle cx="455" cy="210" r="14" fill="#1b232c" stroke="#8a97a3"/>
  <line x1="455" y1="210" x2="463" y2="202" stroke="#39c5e0" stroke-width="1.5"/>
  <line x1="455" y1="196" x2="455" y2="160" stroke="#5b6975" stroke-width="1"/>
  <text x="438" y="240" fill="#8a97a3" font-size="10">gauge</text>

  <defs><marker id="a" markerWidth="8" markerHeight="8" refX="4" refY="6" orient="auto"><path d="M0,6 L4,0 L8,6 Z" fill="#ff5470"/></marker></defs>

  <!-- formula / note strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">Pump flow 36 L/min · relief caps pressure at 21 MPa · supply 16 MPa · P_hyd = ΔP · Q ≈ 9.6 kW</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">Relief returns excess flow to tank; the filter protects the valve spools and cylinder seals.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A5 · HPU ARCHITECTURE · USED IN 2.3 · cyan=pressure line red=relief grey=return</text>
</svg>
