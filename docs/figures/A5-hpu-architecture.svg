<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">HYDRAULIC POWER UNIT — ISO 1219</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">standard symbols — reservoir, pump, relief, filter, gauge (solid = working line, dashed = pilot)</text>

  <defs>
    <marker id="sup" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#39c5e0"/></marker>
  </defs>

  <!-- reservoir: open-top (vented) tank -->
  <path d="M 44 300 L 44 276 M 44 300 L 130 300 M 130 300 L 130 276" fill="none" stroke="#8a97a3" stroke-width="1.8"/>
  <text x="56" y="318" fill="#cdd6df" font-size="11">reservoir</text>

  <!-- electric motor + shaft + fixed-displacement pump -->
  <circle cx="44" cy="232" r="16" fill="none" stroke="#cdd6df" stroke-width="1.5"/>
  <text x="44" y="237" fill="#cdd6df" font-size="11" text-anchor="middle">M</text>
  <line x1="60" y1="229" x2="69" y2="229" stroke="#cdd6df" stroke-width="1.2"/>
  <line x1="60" y1="235" x2="69" y2="235" stroke="#cdd6df" stroke-width="1.2"/>
  <circle cx="90" cy="232" r="20" fill="none" stroke="#39c5e0" stroke-width="1.8"/>
  <path d="M 90 218 L 101 240 L 79 240 Z" fill="#39c5e0"/>
  <text x="64" y="200" fill="#39c5e0" font-size="11">pump</text>
  <!-- suction -->
  <line x1="90" y1="276" x2="90" y2="252" stroke="#8a97a3" stroke-width="1.6"/>

  <!-- pressure riser + rail -->
  <line x1="90" y1="212" x2="90" y2="150" stroke="#39c5e0" stroke-width="2"/>
  <line x1="90" y1="150" x2="470" y2="150" stroke="#39c5e0" stroke-width="2" marker-end="url(#sup)"/>

  <!-- pressure-relief valve (square + arrow + spring + dashed pilot) -->
  <line x1="90" y1="182" x2="158" y2="182" stroke="#39c5e0" stroke-width="1.6"/>
  <rect x="158" y="164" width="40" height="40" fill="none" stroke="#ff5470" stroke-width="1.7"/>
  <line x1="172" y1="200" x2="184" y2="168" stroke="#ff5470" stroke-width="1.6" marker-end="url(#rl)"/>
  <path d="M198 172 l7 -4 l0 8 l7 -8 l0 8 l5 -4" fill="none" stroke="#8a97a3" stroke-width="1.2"/>
  <line x1="124" y1="182" x2="124" y2="214" stroke="#5b6975" stroke-width="1.1" stroke-dasharray="3 3"/>
  <line x1="124" y1="214" x2="178" y2="214" stroke="#5b6975" stroke-width="1.1" stroke-dasharray="3 3"/>
  <line x1="178" y1="214" x2="178" y2="204" stroke="#5b6975" stroke-width="1.1" stroke-dasharray="3 3"/>
  <text x="150" y="158" fill="#ff5470" font-size="11">relief 21 MPa</text>
  <!-- relief return to tank -->
  <line x1="198" y1="184" x2="226" y2="184" stroke="#8a97a3" stroke-width="1.4"/>
  <line x1="226" y1="184" x2="226" y2="300" stroke="#8a97a3" stroke-width="1.4"/>
  <line x1="226" y1="300" x2="130" y2="300" stroke="#8a97a3" stroke-width="1.4"/>
  <defs><marker id="rl" markerWidth="8" markerHeight="8" refX="4" refY="2" orient="auto"><path d="M0,6 L4,0 L8,6 Z" fill="#ff5470"/></marker></defs>

  <!-- filter: diamond + dashed element line -->
  <path d="M 300 132 L 318 150 L 300 168 L 282 150 Z" fill="none" stroke="#8a97a3" stroke-width="1.6"/>
  <line x1="300" y1="136" x2="300" y2="164" stroke="#8a97a3" stroke-width="1.1" stroke-dasharray="3 3"/>
  <text x="284" y="124" fill="#8a97a3" font-size="11">filter</text>

  <!-- pressure gauge: circle + pointer -->
  <line x1="380" y1="150" x2="380" y2="120" stroke="#8a97a3" stroke-width="1.2"/>
  <circle cx="380" cy="106" r="14" fill="none" stroke="#8a97a3" stroke-width="1.5"/>
  <line x1="380" y1="106" x2="389" y2="98" stroke="#39c5e0" stroke-width="1.5"/>
  <text x="396" y="110" fill="#8a97a3" font-size="11">gauge</text>

  <!-- supply label -->
  <text x="392" y="142" fill="#39c5e0" font-size="11">supply 16 MPa</text>
  <text x="392" y="168" fill="#5b6975" font-size="10">→ to DCV / cylinder</text>

  <!-- note strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">Pump 36 L/min · relief caps at 21 MPa · supply 16 MPa · P_hyd = ΔP·Q ≈ 9.6 kW.</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">The relief's dashed pilot line senses upstream pressure; it opens to tank against its spring.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A5 · HPU (ISO 1219) · USED IN 2.3 · all components are ISO 1219 standard symbols</text>
</svg>
