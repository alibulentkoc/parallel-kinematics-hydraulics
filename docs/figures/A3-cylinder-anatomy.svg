<svg viewBox="0 0 540 400" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="540" height="400" rx="6" fill="#0e1217" stroke="#2c3a47"/>
  <text x="22" y="32" fill="#39c5e0" font-size="13" letter-spacing="2.5">HYDRAULIC CYLINDER — ISO 1219</text>
  <text x="22" y="50" fill="#5b6975" font-size="11">double-acting, single-rod (ISO 1219-1 symbol) — area asymmetry shown by annotation</text>

  <!-- ISO 1219 double-acting single-rod cylinder symbol -->
  <!-- barrel -->
  <rect x="110" y="150" width="190" height="78" fill="none" stroke="#cdd6df" stroke-width="2"/>
  <!-- piston -->
  <rect x="176" y="150" width="9" height="78" fill="#cdd6df"/>
  <!-- piston rod (exits right end cap) -->
  <rect x="185" y="183" width="190" height="12" fill="#8a97a3" stroke="#cdd6df" stroke-width="0.6"/>
  <!-- cap-side port A (full-bore side) -->
  <line x1="140" y1="228" x2="140" y2="262" stroke="#39c5e0" stroke-width="2"/>
  <text x="128" y="278" fill="#39c5e0" font-size="11">A</text>
  <text x="120" y="292" fill="#5b6975" font-size="9">cap</text>
  <!-- rod-side port B (annular side) -->
  <line x1="270" y1="228" x2="270" y2="262" stroke="#39c5e0" stroke-width="2"/>
  <text x="262" y="278" fill="#39c5e0" font-size="11">B</text>
  <text x="256" y="292" fill="#5b6975" font-size="9">rod</text>
  <!-- chamber labels (annotation) -->
  <text x="118" y="140" fill="#8a97a3" font-size="10">cap-side  A_cap</text>
  <text x="210" y="140" fill="#8a97a3" font-size="10">rod-side  A_rod</text>
  <text x="330" y="178" fill="#8a97a3" font-size="10">rod</text>

  <!-- area annotation (to scale) — callout, not a replacement symbol -->
  <rect x="392" y="120" width="126" height="150" rx="4" fill="#11171d" stroke="#2c3a47"/>
  <text x="400" y="138" fill="#5b6975" font-size="10">areas to scale</text>
  <circle cx="432" cy="186" r="30" fill="rgba(57,197,224,0.16)" stroke="#39c5e0" stroke-width="1.4"/>
  <circle cx="486" cy="192" r="25" fill="rgba(57,197,224,0.07)" stroke="#39c5e0" stroke-width="1.4"/>
  <text x="412" y="232" fill="#cdd6df" font-size="10">A_cap</text>
  <text x="468" y="232" fill="#cdd6df" font-size="10">A_rod</text>
  <text x="404" y="252" fill="#8a97a3" font-size="10">1257 mm²   877 mm²</text>
  <text x="430" y="266" fill="#ffb454" font-size="10">φ ≈ 1.43</text>

  <!-- formula strip -->
  <line x1="22" y1="330" x2="518" y2="330" stroke="#2c3a47" stroke-width="1"/>
  <text x="22" y="350" fill="#8a97a3" font-size="11">A_cap = π⁄4·D²   A_rod = A_cap − π⁄4·d²   φ = A_cap⁄A_rod   ·   F = P·A   ·   v = Q⁄A</text>
  <text x="22" y="368" fill="#8a97a3" font-size="11">Extend force &gt; retract force; retract speed &gt; extend speed — the asymmetry the symbol implies.</text>

  <!-- metadata footer -->
  <text x="22" y="390" fill="#3a4753" font-size="9" letter-spacing="1">FIG A3 · CYLINDER (ISO 1219-1) · USED IN 2.1 · symbol per ISO 1219; areas are annotation, not a substitute symbol</text>
</svg>
