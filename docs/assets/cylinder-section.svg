<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 320" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="640" height="320" fill="#0e1217"/>
  <text x="40" y="28" fill="#39c5e0" font-size="13" letter-spacing="2">HYDRAULIC CYLINDER — TWO UNEQUAL FACES</text>

  <!-- barrel -->
  <rect x="60" y="70" width="430" height="110" rx="8" fill="#10161d" stroke="#2c3a47" stroke-width="2"/>
  <!-- cap-side oil (left, blue) -->
  <rect x="63" y="73" width="210" height="104" fill="#143a47"/>
  <text x="150" y="60" fill="#39c5e0" font-size="11" text-anchor="middle">cap side — full bore area</text>
  <!-- piston -->
  <rect x="273" y="70" width="16" height="110" fill="#5b6975" stroke="#cdd6df" stroke-width="1.5"/>
  <!-- rod-side oil (right, orange) -->
  <rect x="289" y="73" width="198" height="104" fill="#3a2e12"/>
  <text x="410" y="60" fill="#ffb454" font-size="11" text-anchor="middle">rod side — bore minus rod</text>
  <!-- rod -->
  <rect x="289" y="113" width="280" height="24" fill="#6b7884"/>
  <text x="560" y="129" fill="#8a97a3" font-size="11" text-anchor="end">rod (d)</text>

  <!-- bore dimension -->
  <line x1="48" y1="70" x2="48" y2="180" stroke="#5b6975" stroke-width="1"/>
  <text x="34" y="128" fill="#8a97a3" font-size="11" text-anchor="middle" transform="rotate(-90 34 128)">bore D</text>

  <!-- area circles to scale -->
  <circle cx="180" cy="255" r="42" fill="#143a47" stroke="#39c5e0" stroke-width="2"/>
  <text x="180" y="312" fill="#39c5e0" font-size="11" text-anchor="middle">A_cap = πD²/4</text>
  <circle cx="360" cy="255" r="42" fill="#3a2e12" stroke="#ffb454" stroke-width="2"/>
  <circle cx="360" cy="255" r="23" fill="#0e1217" stroke="#6b7884" stroke-width="1.5"/>
  <text x="360" y="312" fill="#ffb454" font-size="11" text-anchor="middle">A_rod = π(D²−d²)/4</text>
  <text x="510" y="250" fill="#3fe0a0" font-size="22" text-anchor="middle" font-weight="700">φ = A_cap/A_rod</text>
  <text x="510" y="272" fill="#8a97a3" font-size="11" text-anchor="middle">always &gt; 1</text>
</svg>
