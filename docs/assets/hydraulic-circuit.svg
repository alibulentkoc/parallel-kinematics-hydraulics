<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="640" height="340" fill="#0e1217"/>
  <text x="40" y="28" fill="#39c5e0" font-size="13" letter-spacing="2">HYDRAULIC POWER CIRCUIT</text>

  <!-- tank -->
  <rect x="40" y="250" width="70" height="50" fill="none" stroke="#5b6975" stroke-width="2"/>
  <text x="75" y="320" fill="#8a97a3" font-size="11" text-anchor="middle">tank</text>

  <!-- pump -->
  <circle cx="170" cy="200" r="26" fill="#10161d" stroke="#39c5e0" stroke-width="2"/>
  <polygon points="170,182 186,210 154,210" fill="#39c5e0"/>
  <text x="170" y="248" fill="#8a97a3" font-size="11" text-anchor="middle">pump</text>
  <line x1="75" y1="250" x2="75" y2="226" stroke="#5b6975" stroke-width="2"/>
  <line x1="75" y1="226" x2="170" y2="226" stroke="#5b6975" stroke-width="2"/>

  <!-- supply line -->
  <line x1="170" y1="174" x2="170" y2="110" stroke="#3fe0a0" stroke-width="2.5"/>
  <line x1="170" y1="110" x2="340" y2="110" stroke="#3fe0a0" stroke-width="2.5"/>
  <text x="250" y="100" fill="#3fe0a0" font-size="11" text-anchor="middle">supply (16 MPa)</text>

  <!-- relief valve -->
  <rect x="250" y="160" width="36" height="40" fill="#10161d" stroke="#ffb454" stroke-width="2"/>
  <line x1="268" y1="110" x2="268" y2="160" stroke="#ffb454" stroke-width="2"/>
  <line x1="268" y1="200" x2="268" y2="250" stroke="#5b6975" stroke-width="2"/>
  <line x1="268" y1="250" x2="110" y2="250" stroke="#5b6975" stroke-width="2"/>
  <text x="304" y="184" fill="#ffb454" font-size="11">relief (21 MPa)</text>

  <!-- proportional valve -->
  <rect x="340" y="92" width="80" height="40" fill="#10161d" stroke="#39c5e0" stroke-width="2"/>
  <line x1="360" y1="92" x2="360" y2="132" stroke="#2c3a47"/>
  <line x1="400" y1="92" x2="400" y2="132" stroke="#2c3a47"/>
  <text x="380" y="150" fill="#39c5e0" font-size="11" text-anchor="middle">prop. valve (u)</text>

  <!-- to cylinder -->
  <line x1="420" y1="105" x2="500" y2="105" stroke="#39c5e0" stroke-width="2.5"/>
  <line x1="420" y1="120" x2="500" y2="120" stroke="#ffb454" stroke-width="2.5"/>

  <!-- cylinder -->
  <rect x="500" y="80" width="110" height="64" rx="6" fill="#10161d" stroke="#2c3a47" stroke-width="2"/>
  <rect x="503" y="83" width="40" height="58" fill="#143a47"/>
  <rect x="543" y="80" width="10" height="64" fill="#5b6975"/>
  <rect x="553" y="104" width="80" height="16" fill="#6b7884"/>
  <text x="555" y="164" fill="#8a97a3" font-size="11" text-anchor="middle">cylinder + load</text>

  <text x="40" y="320" fill="#5b6975" font-size="10">pump sets max flow · relief caps pressure · valve meters flow to the cylinder</text>
</svg>
