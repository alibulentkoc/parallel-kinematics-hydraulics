<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="640" height="260" fill="#0e1217"/>
  <text x="40" y="28" fill="#39c5e0" font-size="13" letter-spacing="2">THE FEEDBACK LOOP</text>

  <!-- setpoint -->
  <text x="40" y="105" fill="#3fe0a0" font-size="12">setpoint r</text>
  <line x1="110" y1="100" x2="150" y2="100" stroke="#3fe0a0" stroke-width="2"/>

  <!-- summing junction -->
  <circle cx="165" cy="100" r="15" fill="#10161d" stroke="#cdd6df" stroke-width="2"/>
  <text x="165" y="105" fill="#cdd6df" font-size="14" text-anchor="middle">−</text>
  <text x="150" y="86" fill="#3fe0a0" font-size="12">+</text>

  <!-- error -->
  <line x1="180" y1="100" x2="225" y2="100" stroke="#39c5e0" stroke-width="2"/>
  <text x="202" y="92" fill="#8a97a3" font-size="11" text-anchor="middle">e</text>

  <!-- PID block -->
  <rect x="225" y="72" width="110" height="56" fill="#10161d" stroke="#39c5e0" stroke-width="2"/>
  <text x="280" y="96" fill="#39c5e0" font-size="12" text-anchor="middle">PID</text>
  <text x="280" y="116" fill="#8a97a3" font-size="10" text-anchor="middle">Kp·e + Ki∫e + Kd·ė</text>

  <!-- command -->
  <line x1="335" y1="100" x2="380" y2="100" stroke="#39c5e0" stroke-width="2"/>
  <text x="357" y="92" fill="#8a97a3" font-size="11" text-anchor="middle">u</text>

  <!-- plant -->
  <rect x="380" y="72" width="130" height="56" fill="#10161d" stroke="#cdd6df" stroke-width="2"/>
  <text x="445" y="96" fill="#cdd6df" font-size="12" text-anchor="middle">valve + cylinder</text>
  <text x="445" y="116" fill="#8a97a3" font-size="10" text-anchor="middle">(the plant)</text>

  <!-- output -->
  <line x1="510" y1="100" x2="585" y2="100" stroke="#3fe0a0" stroke-width="2"/>
  <text x="560" y="92" fill="#3fe0a0" font-size="12" text-anchor="middle">position y</text>

  <!-- feedback path -->
  <line x1="548" y1="100" x2="548" y2="190" stroke="#ffb454" stroke-width="2"/>
  <line x1="548" y1="190" x2="165" y2="190" stroke="#ffb454" stroke-width="2"/>
  <line x1="165" y1="190" x2="165" y2="115" stroke="#ffb454" stroke-width="2"/>
  <polygon points="165,113 160,123 170,123" fill="#ffb454"/>
  <rect x="300" y="172" width="110" height="34" fill="#10161d" stroke="#ffb454" stroke-width="1.5"/>
  <text x="355" y="194" fill="#ffb454" font-size="11" text-anchor="middle">sensor</text>

  <text x="40" y="240" fill="#5b6975" font-size="10">sense → compare → correct → actuate, forever — the error e is the quantity control fights to zero</text>
</svg>
