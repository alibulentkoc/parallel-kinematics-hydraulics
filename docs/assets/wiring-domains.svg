<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" font-family="ui-monospace, Menlo, Consolas, monospace">
  <rect width="640" height="300" fill="#0e1217"/>
  <text x="40" y="28" fill="#39c5e0" font-size="13" letter-spacing="2">FROM SIGNAL TO MOTION — THREE DOMAINS</text>

  <!-- control domain -->
  <rect x="40" y="60" width="170" height="180" rx="6" fill="#10161d" stroke="#39c5e0" stroke-width="1.5"/>
  <text x="125" y="80" fill="#39c5e0" font-size="12" text-anchor="middle">CONTROL</text>
  <text x="125" y="100" fill="#8a97a3" font-size="10" text-anchor="middle">(low voltage, logic)</text>
  <rect x="60" y="115" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="125" y="137" fill="#cdd6df" font-size="11" text-anchor="middle">controller / PLC</text>
  <rect x="60" y="160" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="125" y="182" fill="#cdd6df" font-size="11" text-anchor="middle">±10 V / PWM out</text>

  <!-- signal domain -->
  <rect x="235" y="60" width="170" height="180" rx="6" fill="#10161d" stroke="#ffb454" stroke-width="1.5"/>
  <text x="320" y="80" fill="#ffb454" font-size="12" text-anchor="middle">SIGNAL</text>
  <text x="320" y="100" fill="#8a97a3" font-size="10" text-anchor="middle">(sense &amp; drive)</text>
  <rect x="255" y="115" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="320" y="137" fill="#cdd6df" font-size="11" text-anchor="middle">valve driver</text>
  <rect x="255" y="160" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="320" y="182" fill="#cdd6df" font-size="11" text-anchor="middle">position sensor</text>

  <!-- power domain -->
  <rect x="430" y="60" width="170" height="180" rx="6" fill="#10161d" stroke="#3fe0a0" stroke-width="1.5"/>
  <text x="515" y="80" fill="#3fe0a0" font-size="12" text-anchor="middle">POWER</text>
  <text x="515" y="100" fill="#8a97a3" font-size="10" text-anchor="middle">(hydraulic)</text>
  <rect x="450" y="115" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="515" y="137" fill="#cdd6df" font-size="11" text-anchor="middle">proportional valve</text>
  <rect x="450" y="160" width="130" height="34" fill="#151b22" stroke="#2c3a47"/>
  <text x="515" y="182" fill="#cdd6df" font-size="11" text-anchor="middle">cylinder + load</text>

  <!-- arrows -->
  <line x1="210" y1="132" x2="235" y2="132" stroke="#cdd6df" stroke-width="2"/><polygon points="235,132 227,127 227,137" fill="#cdd6df"/>
  <line x1="405" y1="132" x2="430" y2="132" stroke="#cdd6df" stroke-width="2"/><polygon points="430,132 422,127 422,137" fill="#cdd6df"/>
  <!-- feedback arrow back -->
  <line x1="450" y1="177" x2="385" y2="177" stroke="#ffb454" stroke-width="2"/>
  <line x1="255" y1="177" x2="190" y2="177" stroke="#ffb454" stroke-width="2"/><polygon points="190,177 198,172 198,182" fill="#ffb454"/>
  <text x="320" y="218" fill="#ffb454" font-size="10" text-anchor="middle">sensor feedback returns to control</text>
</svg>
