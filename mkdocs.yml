site_name: PKM Testbed — Learn Electrohydraulic Parallel Kinematics
site_description: A self-guided course in parallel kinematics, hydraulics, control, and digital twins, built around an electrohydraulic parallel kinematics machine.
site_url: https://alibulentkoc.github.io/parallel-kinematics-hydraulics/
repo_url: https://github.com/alibulentkoc/parallel-kinematics-hydraulics
repo_name: parallel-kinematics-hydraulics
docs_dir: docs

theme:
  name: material
  font: false
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  notebooks/*.ipynb
  notebooks/*.py
  archive/*

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mermaid/mermaid.min.js
  - assets/mathjax.js
  - javascripts/mathjax/tex-mml-svg.js

plugins:
  - search

nav:
  - Home: index.md
  - "Module 1 — Kinematic Twin":
      - module01/index.md
      - "1.1 What Is a Parallel Kinematics Machine?": module01/1-1-what-is-a-pkm.md
      - "1.2 The 2-RPR Geometry & Pose": module01/1-2-geometry-and-pose.md
      - "2.1 Inverse Kinematics": module01/2-1-inverse-kinematics.md
      - "2.2 Forward Kinematics": module01/2-2-forward-kinematics.md
      - "2.3 Reachability & the Workspace": module01/2-3-reachability.md
      - "3.1 The Jacobian & Manipulability": module01/3-1-jacobian.md
      - "3.2 Singularities": module01/3-2-singularities.md
  - "Module 2 — Hydraulic Twin":
      - module02/index.md
      - "1.1 The Hydraulic Cylinder": module02/1-1-the-hydraulic-cylinder.md
      - "1.2 Area Asymmetry φ": module02/1-2-area-asymmetry.md
      - "1.3 Force and Speed": module02/1-3-force-and-speed.md
      - "2.1 The Valve Flow Law": module02/2-1-valve-flow-law.md
      - "2.2 Load Pressure & the Jacobian": module02/2-2-load-pressure.md
      - "2.3 Pump & Relief Sizing": module02/2-3-pump-and-relief.md
  - "Module 3 — Control Twin":
      - module03/index.md
      - "1.1 Why Feedback": module03/1-1-why-feedback.md
      - "1.2 PID Control": module03/1-2-pid-control.md
      - "1.3 The Tuning Trade-off": module03/1-3-tuning-tradeoff.md
      - "2.1 Joint-Space vs Task-Space": module03/2-1-joint-vs-task-space.md
      - "2.2 Feedforward & Trajectory Tracking": module03/2-2-feedforward.md
  - "Module 4 — Validation Twin":
      - module04/index.md
      - "1.1 The Three Domains": module04/1-1-three-domains.md
      - "2.1 Logging & the Canonical Schema": module04/2-1-logging-and-schema.md
      - "2.2 Grading Sim & Hardware Identically": module04/2-2-grading-sim-and-hardware.md
  - "Hardware Integration":
      - hardware-integration/index.md
      - "Sensors & Valve Drivers": hardware-integration/sensors-and-drivers.md
      - "Wiring & Safety Chain": hardware-integration/wiring-and-safety.md
  - "Capstone — End-to-End Design":
      - capstone/index.md
      - "2-DOF Machine Design": capstone/2dof-design.md
      - "3-DOF Machine Design": capstone/3dof-design.md
  - "Project Handbook":
      - handbook/index.md
      - "2 · Kinematic Twin": handbook/02-kinematic-twin.md
      - "3 · Hydraulic Twin": handbook/03-hydraulic-twin.md
      - "4 · Control Twin": handbook/04-control-twin.md
      - "5 · Validation Twin": handbook/05-validation-twin.md
      - "Appendix A · Wiring & I/O": handbook/06-wiring-and-io-appendix.md
  - "Interactive Demos": demos/index.html
  - "Python & Notebooks": notebooks/index.md
  - "Roadmap": roadmap.md
