site_name: PKM Testbed — Learn Electrohydraulic Parallel Kinematics
site_description: A self-guided course in parallel kinematics, hydraulics, control, and digital twins, built around an electrohydraulic parallel kinematics machine.
site_url: https://alibulentkoc.github.io/parallel-kinematics-hydraulics/
repo_url: https://github.com/alibulentkoc/parallel-kinematics-hydraulics
repo_name: parallel-kinematics-hydraulics
docs_dir: docs

theme:
  name: material
  font: false
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  notebooks/*.ipynb
  notebooks/*.py

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mermaid/mermaid.min.js
  - assets/mathjax.js
  - javascripts/mathjax/tex-mml-svg.js

plugins:
  - search

nav:
  - Home: index.md
  - "Module 1 — Kinematics":
      - "Overview": module01/index.md
      - "Unit 1 — The Parallel Machine":
          - "1.1 What Is a Parallel Kinematics Machine?": module01/1-1-what-is-a-pkm.md
          - "1.2 The 2-RPR Geometry & Pose": module01/1-2-geometry-and-pose.md
      - "Unit 2 — Solving the Motion":
          - "2.1 Inverse Kinematics · demo": module01/2-1-inverse-kinematics.md
          - "2.2 Forward Kinematics": module01/2-2-forward-kinematics.md
          - "2.3 Reachability & the Workspace": module01/2-3-reachability.md
      - "Unit 3 — Differential Motion":
          - "3.1 The Jacobian & Manipulability · demo": module01/3-1-jacobian.md
          - "3.2 Singularities · demo": module01/3-2-singularities.md
  - "Module 2 — Hydraulic Actuation":
      - "Overview": module02/index.md
      - "Unit 1 — Cylinders & Asymmetry":
          - "1.1 The Hydraulic Cylinder": module02/1-1-the-hydraulic-cylinder.md
          - "1.2 Area Asymmetry φ · demo": module02/1-2-area-asymmetry.md
          - "1.3 Force and Speed": module02/1-3-force-and-speed.md
      - "Unit 2 — Valves, Flow & Pressure":
          - "2.1 The Valve Flow Law · demo": module02/2-1-valve-flow-law.md
          - "2.2 Load Pressure & the Jacobian": module02/2-2-load-pressure.md
          - "2.3 Pump & Relief Sizing": module02/2-3-pump-and-relief.md
  - "Module 3 — Closed-Loop Control":
      - "Overview": module03/index.md
      - "Unit 1 — The Feedback Loop":
          - "1.1 Why Feedback": module03/1-1-why-feedback.md
          - "1.2 PID Control · demo": module03/1-2-pid-control.md
          - "1.3 The Tuning Trade-off · demo": module03/1-3-tuning-tradeoff.md
      - "Unit 2 — Controlling a Parallel Machine":
          - "2.1 Joint-Space vs Task-Space": module03/2-1-joint-vs-task-space.md
          - "2.2 Feedforward & Trajectory Tracking": module03/2-2-feedforward.md
  - "Module 4 — From Simulator to Hardware":
      - "Overview": module04/index.md
      - "Unit 1 — Electrical & Control Wiring":
          - "1.1 The Three Domains": module04/1-1-three-domains.md
          - "1.2 Sensors & Valve Drivers": module04/1-2-sensors-and-drivers.md
          - "1.3 Wiring & Safety Chain": module04/1-3-wiring-and-safety.md
      - "Unit 2 — The Digital Twin":
          - "2.1 Logging & the Canonical Schema": module04/2-1-logging-and-schema.md
          - "2.2 Grading Sim & Hardware Identically": module04/2-2-grading-sim-and-hardware.md
  - "Capstone — End-to-End Design":
      - "Overview": capstone/index.md
      - "2-DOF Machine Design": capstone/2dof-design.md
      - "3-DOF Machine Design": capstone/3dof-design.md
  - "Reference Handbook":
